<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #1DA1F2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1991DA;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: green;
      display: none;
    }
    .help {
      font-size: 12px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h3>AI Copilot Settings</h3>
  
  <div class="help">
    Enter your Google Gemini API Key below.
    <a href="https://aistudio.google.com/app/apikey" target="_blank">Get Key Here</a>
  </div>

  <input type="password" id="apiKey" placeholder="Paste Gemini API Key">
  <button id="saveBtn">Save Key</button>
  
  <div id="status" class="status">Settings saved!</div>

  <script src="popup.js"></script>
</body>
</html>
